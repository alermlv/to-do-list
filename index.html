<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>To-do list</title>
  </head>
  <body>
    <main class="content">

      <!-- Add task section -->
      <section class="add-task-section">
        <h1 class="title">To-do list</h1>
        <form id="add-task-form" class="add-task-form">
          <div class="add-task-form__top">
            <input type="text" id="task-name-input" class="task-name-input" placeholder="Write a task..." minlength="1" required>
            <button type="submit" class="button button--primary add-task-button">Add task</button>
          </div>
          <div class="add-task-form__bottom">
            <input type="text" id="task-description-input" class="task-description-input" placeholder="Write a description...">
            <input type="date" id="task-date-input" class="task-date-input">
            <button type="button" class="button button--secondary important-task-button" aria-pressed="false">Star</button>
          </div>
        </form>
      </section>

      <!-- Tasks section -->
      <section class="tasks-section">
        <div class="tasks-block">
          <div class="tasks-block__title">Important</div>
          <div class="tasks-block__list">
            <div class="task-item">
              <button type="button" class="button button--check complete-task-button">Chek</button>
              <div class="task-item__content">
                <div class="task-item__name">Read a book</div>
                <div class="task-item__description">Read a JavaScript tutorial book</div>
              </div>
              <button type="button" class="button button--icon delete-task-button">Delete</button>
            </div>
          </div>
        </div>
        
        <div class="tasks-block">
          <div class="tasks-block__title">Completed</div>
          <div class="tasks-block__list">
            <div class="task-item task-item--completed">
              <button type="button" class="button button--check complete-task-button complete-task-button--done">Chek</button>
              <div class="task-item__content">
                <div class="task-item__name">Read a book</div>
                <div class="task-item__description">Read a JavaScript tutorial book</div>
              </div>
              <button type="button" class="button button--icon delete-task-button">Delete</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
