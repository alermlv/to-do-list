<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>To-do list</title>
  </head>
  <body>
    <main class="content">

      <!-- Add task section -->
      <section class="add-task-section">
        <h1 class="title">To-do list</h1>
        <form id="add-task-form" class="add-task-form">
          <div class="add-task-form__top">
            <input type="text" id="task-name-input" class="task-name-input" placeholder="Write a task..." minlength="1" required>
            <button type="submit" class="button button--primary add-task-button" aria-label="Add task">Add task</button>
          </div>
          <div class="add-task-form__bottom">
            <input type="text" id="task-description-input" class="task-description-input" placeholder="Write a description...">
            <input type="date" id="task-date-input" class="task-date-input">
            <button type="button" class="button button--important important-task-button" aria-label="Mark as important" aria-pressed="false">

              </svg>
            </button>
          </div>
        </form>
      </section>

          </ul>
        </div>

              <div class="task-item__content">

        </div>
      </section>
    </main>
  </body>
</html>
